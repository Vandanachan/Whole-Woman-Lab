<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — Whole Woman Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --oxblood-3:#3a0f19; --oxblood-2:#5c1a28;
  --on-dark:#f4eadd; --on-dark-muted:#d9b3a6; --rose:#c98a6b;
  --font-display:"Playfair Display",Georgia,serif;
  --font-sans:"Inter",ui-sans-serif,system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--oxblood-3);color:var(--on-dark);font-family:var(--font-sans);min-height:100vh;display:flex;flex-direction:column}
.nav{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;padding:20px 28px;border-bottom:1px solid rgba(244,234,221,.14)}
.nav>a{font-family:var(--font-sans);font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--on-dark);text-decoration:none}
.nav-links{display:flex;gap:22px;flex-wrap:wrap}
.nav-links a{font-family:var(--font-sans);font-weight:600;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--on-dark-muted);text-decoration:none}
.nav-links a:hover{color:var(--on-dark)}
main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:64px 28px}
.eyebrow{font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--rose);font-weight:700;margin-bottom:18px}
h1{font-family:var(--font-display);font-style:italic;font-weight:600;font-size:clamp(28px,5vw,46px);margin:0 0 20px;max-width:14ch}
p{max-width:480px;margin:0 auto 34px;color:var(--on-dark-muted);font-size:15.5px;line-height:1.6}
.btn{font-family:var(--font-sans);font-weight:700;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;padding:14px 26px;border-radius:999px;border:1.5px solid var(--on-dark);color:var(--on-dark);text-decoration:none;display:inline-flex;margin:6px}
.btn:hover{background:var(--on-dark);color:var(--oxblood-3)}
.social{display:flex;justify-content:center;gap:14px;margin-top:36px}
.social a{width:34px;height:34px;border-radius:50%;background:var(--on-dark);color:var(--oxblood-3);display:flex;align-items:center;justify-content:center;text-decoration:none;font-family:var(--font-sans);font-weight:700;font-size:12px}
</style>
</head>
<body>
<div class="nav">
  <a href="/">Whole Woman Lab</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/services">Services</a>
    <a href="/whole-woman-academy">Whole Woman Academy</a>
    <a href="/contact">Contact Us</a>
  </div>
</div>
<main>
  <div>
    <div class="eyebrow">Get In Touch</div>
    <h1>We'd love to hear from you</h1>
    <p>Questions about Archetype Map, Root Cause Club, Whole Woman Academy, or anything else — reach out directly and we'll get back to you.</p>
    <a href="mailto:mail@wholewomanlab.com" class="btn">Email mail@wholewomanlab.com →</a>
    <div>
      <a href="/" class="btn">Back to Home →</a>
    </div>
    <div class="social">
      <a href="https://www.instagram.com/wholewomanlab/" aria-label="Instagram" target="_blank" rel="noopener">IG</a>
      <a href="https://www.linkedin.com/in/veefitcheck/" aria-label="LinkedIn" target="_blank" rel="noopener">in</a>
      <a href="https://www.youtube.com/@Wholewomanlab" aria-label="YouTube" target="_blank" rel="noopener">YT</a>
    </div>
  </div>
</main>
</body>
</html>
