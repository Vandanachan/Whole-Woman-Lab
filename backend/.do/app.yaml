# DigitalOcean App Platform spec — deploys the backend in the Bangalore (BLR)
# region for India data-residency. Import this in the DO dashboard, or edit the
# `github` block to point at your repo for auto-deploys.
name: wwl-backend
region: blr
services:
  - name: api
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /health
    routes:
      - path: /
    envs:
      - key: PORT
        value: "8080"
